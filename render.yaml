# Render blueprint.
#
#   Dashboard -> New -> Blueprint -> point at this repo.
#
# `npm run build` triggers the `prebuild` hook, which runs
# scripts/build-data.ts to regenerate src/data/generated/data.json from the
# workbooks in timetable/ and students/. That artifact is gitignored, so the
# build step is what produces it — dropping in a new spreadsheet and pushing is
# all that's needed to refresh the data.

services:
  - type: web
    name: kiit-archive
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Next.js binds to $PORT, which Render injects automatically.
      - key: NODE_ENV
        value: production
